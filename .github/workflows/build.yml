name: Build & Release VintedBot EXE

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests
        
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name=VintedBot --hidden-import=tkinter VintedBotPortable.py
        
    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT
        
    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        tag: v${{ steps.date.outputs.date }}
        name: VintedBot ${{ steps.date.outputs.date }}
        artifacts: dist/VintedBot.exe
        allowUpdates: true
        generateReleaseNotes: true
        token: ${{ secrets.GITHUB_TOKEN }}
