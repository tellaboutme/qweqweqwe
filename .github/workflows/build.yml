name: Build VintedBot EXE

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests
        
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name=VintedBot --hidden-import=tkinter VintedBotPortable.py
        
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: VintedBot.exe
        path: dist/VintedBot.exe
